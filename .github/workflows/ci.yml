name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        workspace: [client, server]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build client
        if: matrix.workspace == 'client'
        run: npm run build --workspace client

      - name: Validate server boots
        if: matrix.workspace == 'server'
        run: node --check server/server.js

