<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF1F2"/>
      <stop offset="55%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FEF3C7"/>
    </linearGradient>
    <radialGradient id="mesh1" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#DC2626" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#DC2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mesh2" cx="80%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="mesh3" cx="50%" cy="90%" r="65%">
      <stop offset="0%" stop-color="#FBCFE8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#FBCFE8" stop-opacity="0"/>
    </radialGradient>
    <mask id="fade">
      <rect x="0" y="0" width="1200" height="630" fill="url(#fadeGrad)"/>
    </mask>
    <radialGradient id="fadeGrad" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#0A0A0A" fill-opacity="0.10"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#mesh1)"/>
  <rect width="1200" height="630" fill="url(#mesh2)"/>
  <rect width="1200" height="630" fill="url(#mesh3)"/>

  <g mask="url(#fade)">
    <rect width="1200" height="630" fill="url(#dots)"/>
  </g>

  <g filter="url(#blur)" opacity="0.65">
    <circle cx="980" cy="220" r="42" fill="#DC2626" fill-opacity="0.25"/>
    <path d="M1030 360 L1080 450 L980 450 Z" fill="#F59E0B" fill-opacity="0.22"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <text x="90" y="270" font-size="92" font-weight="800" fill="#0A0A0A">AAIE</text>
    <text x="90" y="340" font-size="36" font-weight="600" fill="#525252" font-family="Tiro Devanagari Marathi, serif">
      M/> .>/G(G, AI  6?M7#
    </text>
    <text x="90" y="410" font-size="22" font-weight="500" fill="#525252">
      Pune, Maharashtra " 2026
    </text>
  </g>
</svg>

